<rect width="1100" height="520" rx="24" fill="#F8FBFF"/>
<text x="550" y="50" fill="#0B1736" font-family="Inter,Arial" font-size="28" font-weight="800" text-anchor="middle">Pont AML × ADL</text>
<g font-family="Inter,Arial">
<rect x="70" y="110" width="380" height="300" rx="18" fill="#FFFFFF" stroke="#93C5FD"/>
<text x="260" y="150" fill="#2563EB" font-size="22" font-weight="800" text-anchor="middle">AML</text>
<text x="260" y="190" fill="#0B1736" font-size="18" text-anchor="middle">Stacking & Blending</text>
<text x="110" y="240" fill="#5F6F8C" font-size="15">• Ensembles explicites</text>
